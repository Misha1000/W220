<script src="https://cdnjs.cloudflare.com/ajax/libs/tabletop.js/1.6.0/tabletop.min.js"></script>
<script>
function initMap() {
  const map = new google.maps.Map(document.getElementById("map"), {
    zoom: 11,
    center: { lat: 51.35014, lng: 25.85264 }
  });

  markers = [];

  Tabletop.init({
    key: "https://docs.google.com/spreadsheets/d/e/2PACX-1vS7mxstNyqXWIU79FodXP-KXhPSqIN9eIavtgfTcuUbHxw8KEl7rPKJfbORiXpedlrnpRGC6MqvwH01/pub?output=csv",
    simpleSheet: true,
    callback: function(data, tabletop) {
      data.forEach(item => {
        const lat = parseFloat(item["Google Maps координати (широта, довгота)"].split(",")[0].trim());
        const lng = parseFloat(item["Google Maps координати (широта, довгота)"].split(",")[1].trim());
        const name = item["Ім'я"];
        const type = item["Тип підключення...."];

        if(isNaN(lat) || isNaN(lng)) return;

        const marker = new google.maps.Marker({
          position: {lat, lng},
          map: map,
          title: name
        });

        marker.type = type;
        markers.push(marker);
      });
    }
  });
}
</script>
<script async defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBKszoB_C2jBnsTVzaEM4_pJL6vYgDRjWg&callback=initMap">
</script>
